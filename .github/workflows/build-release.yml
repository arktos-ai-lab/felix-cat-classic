name: Build & Release

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write

    env:
      LUA_VERSION: "5.2.4"
      WTL_VERSION: "10.0.10320"
      BOOST_PKGS: >-
        boost-algorithm:x86-windows
        boost-any:x86-windows
        boost-assign:x86-windows
        boost-bind:x86-windows
        boost-filesystem:x86-windows
        boost-flyweight:x86-windows
        boost-foreach:x86-windows
        boost-format:x86-windows
        boost-function:x86-windows
        boost-lexical-cast:x86-windows
        boost-locale:x86-windows
        boost-range:x86-windows
        boost-regex:x86-windows
        boost-smart-ptr:x86-windows
        boost-static-assert:x86-windows
        boost-test:x86-windows
        boost-timer:x86-windows
        boost-tuple:x86-windows
        boost-unordered:x86-windows

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Setup MSBuild (VS 2022)
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      # -----------------------------------------------------------------------
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x86'   # Felix embeds 32-bit Python

      # -----------------------------------------------------------------------
      - name: Cache dependencies
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: |
            C:\deps
            C:\vcpkg\installed
          key: felix-deps-${{ runner.os }}-lua${{ env.LUA_VERSION }}-wtl${{ env.WTL_VERSION }}-boost5

      # -----------------------------------------------------------------------
      - name: Download and build Lua ${{ env.LUA_VERSION }}
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\deps | Out-Null
          $url = "https://www.lua.org/ftp/lua-$env:LUA_VERSION.tar.gz"
          Invoke-WebRequest $url -OutFile "$env:TEMP\lua.tar.gz" -UseBasicParsing
          Push-Location $env:TEMP
          tar -xzf lua.tar.gz
          Move-Item "lua-$env:LUA_VERSION" C:\deps\lua
          Pop-Location
          # Build Lua static lib with the VS toolchain
          Push-Location C:\deps\lua\src
          $env:Path = "$env:Path;" + (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -find 'VC\Tools\MSVC\**\bin\HostX86\x86' | Select-Object -First 1)
          cl /nologo /O2 /W3 /c /D_CRT_SECURE_NO_DEPRECATE *.c
          if (Test-Path lua.obj)   { Remove-Item lua.obj }
          if (Test-Path luac.obj)  { Remove-Item luac.obj }
          lib /nologo /out:lua52.lib *.obj
          Pop-Location
          Write-Host "Lua built: $(Test-Path C:\deps\lua\src\lua52.lib)"

      # -----------------------------------------------------------------------
      - name: Download LuaBridge
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/vinniefalco/LuaBridge.git C:/deps/LuaBridge

      # -----------------------------------------------------------------------
      - name: Download LuaWrapper
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 https://github.com/Enfis/luawrapper.git C:/deps/LuaWrapper || \
          git clone --depth 1 https://github.com/kmsquire/luawrapper.git C:/deps/LuaWrapper || \
          mkdir -p C:/deps/LuaWrapper/LuaWrapper

      # -----------------------------------------------------------------------
      - name: Download WTL ${{ env.WTL_VERSION }} headers
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: bash
        run: |
          git clone --depth 1 --branch WTL_10_0_10320 https://github.com/Win32-WTL/WTL.git C:/deps/wtl 2>/dev/null || \
          git clone --depth 1 https://github.com/Win32-WTL/WTL.git C:/deps/wtl
          ls C:/deps/wtl/Include/atlapp.h && echo "WTL headers OK"

      # -----------------------------------------------------------------------
      - name: Install Boost via vcpkg
        if: steps.cache-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Install all Boost packages needed by Felix StdAfx.h
          $pkgs = "$env:BOOST_PKGS" -split '\s+' | Where-Object { $_ -ne '' }
          vcpkg install @pkgs
          Write-Host "Boost install complete"

      # -----------------------------------------------------------------------
      - name: Create boost/timer.hpp compatibility shim
        shell: pwsh
        run: |
          # boost/timer.hpp (the old simple boost::timer class) was removed in Boost 1.80.
          # vcpkg now provides boost/timer/timer.hpp (the new cpu_timer) but Felix uses
          # the old API.  Re-create the removed header as a minimal drop-in.
          # Always overwrite — vcpkg installs a boost/timer.hpp with #error, so we
          # must replace it unconditionally with our compatibility shim.
          $shimPath = "C:\vcpkg\installed\x86-windows\include\boost\timer.hpp"
          New-Item -ItemType Directory -Force (Split-Path $shimPath) | Out-Null
          $lines = @(
            '#pragma once',
            '// Compatibility shim: boost/timer.hpp (old API) replaced by shim.',
            '#ifndef BOOST_TIMER_HPP_INCLUDED',
            '#define BOOST_TIMER_HPP_INCLUDED',
            '#include <boost/config.hpp>',
            '#include <ctime>',
            '#include <limits>',
            'namespace boost {',
            '  class timer {',
            '  public:',
            '    typedef std::clock_t clock_t;',
            '    timer() { _start = std::clock(); }',
            '    void   restart() { _start = std::clock(); }',
            '    double elapsed() const {',
            '      return double(std::clock() - _start) / CLOCKS_PER_SEC;',
            '    }',
            '    double elapsed_max() const {',
            '      return (double((std::numeric_limits<clock_t>::max)()) -',
            '              double(_start)) / double(CLOCKS_PER_SEC);',
            '    }',
            '    double elapsed_min() const { return double(1) / double(CLOCKS_PER_SEC); }',
            '  private:',
            '    clock_t _start;',
            '  };',
            '} // namespace boost',
            '#endif // BOOST_TIMER_HPP_INCLUDED'
          )
          Set-Content -Path $shimPath -Value $lines -Encoding UTF8
          Write-Host "Wrote boost/timer.hpp shim to $shimPath"

      # -----------------------------------------------------------------------
      - name: Place cpptempl where Felix.vcxproj expects it
        shell: pwsh
        run: |
          # Felix.vcxproj references ..\..\cpptempl\cpptempl.cpp relative to src/Felix/
          # which resolves to cpptempl/ at the repo root.
          $dest = "$env:GITHUB_WORKSPACE\cpptempl"
          if (-not (Test-Path $dest)) {
            Copy-Item -Recurse -Force "$env:GITHUB_WORKSPACE\src\cpptempl" $dest
          }
          Write-Host "cpptempl at ${dest}: $(Test-Path ${dest}\cpptempl.h)"

      # -----------------------------------------------------------------------
      - name: Place Lua sources where Felix.vcxproj expects them
        shell: pwsh
        run: |
          # Felix.vcxproj references ..\..\lua-5.2.2\src\*.c relative to src/Felix/
          # which resolves to lua-5.2.2/ at the repo root.
          $dest = "$env:GITHUB_WORKSPACE\lua-5.2.2"
          if (-not (Test-Path $dest)) {
            Copy-Item -Recurse -Force C:\deps\lua $dest
          }
          Write-Host "Lua sources at $dest\src: $(Test-Path $dest\src\lapi.c)"

      # -----------------------------------------------------------------------
      - name: Add LuaBridge to src (expected relative path)
        shell: bash
        run: |
          # Felix.vcxproj expects ..\..\LuaBridge relative to src/Felix/
          cp -r C:/deps/LuaBridge src/LuaBridge

      - name: Add LuaWrapper to src
        shell: bash
        run: |
          cp -r C:/deps/LuaWrapper src/LuaWrapper

      # -----------------------------------------------------------------------
      - name: Create D:\dev\cpp compatibility junctions for add-in projects
        shell: pwsh
        run: |
          # WordAssist.vcxproj has hardcoded D:\dev\cpp\ paths.
          # Create directory junctions so those paths resolve correctly.
          New-Item -ItemType Directory -Force "D:\dev\cpp" | Out-Null
          # LuaBridge: D:\dev\cpp\LuaBridge -> C:\deps\LuaBridge
          if (-not (Test-Path "D:\dev\cpp\LuaBridge")) {
            cmd /c mklink /J "D:\dev\cpp\LuaBridge" "C:\deps\LuaBridge"
          }
          # LuaWrapper: D:\dev\cpp\LuaWrapper -> C:\deps\LuaWrapper
          if (-not (Test-Path "D:\dev\cpp\LuaWrapper")) {
            cmd /c mklink /J "D:\dev\cpp\LuaWrapper" "C:\deps\LuaWrapper"
          }
          # lua-5.2.2: D:\dev\cpp\lua-5.2.2 -> C:\deps\lua
          if (-not (Test-Path "D:\dev\cpp\lua-5.2.2")) {
            cmd /c mklink /J "D:\dev\cpp\lua-5.2.2" "C:\deps\lua"
          }
          Write-Host "Junctions created:"
          Get-Item "D:\dev\cpp\*" | ForEach-Object { Write-Host "  $($_.FullName) -> $($_.Target)" }

      # -----------------------------------------------------------------------
      # Inject CI-specific include/lib paths via Directory.Build.targets — this file
      # is auto-imported by MSBuild after all .props files, so $(IncludePath) is
      # fully formed and we can safely prepend without losing the VC++ system paths.
      - name: Inject CI include/lib paths via Directory.Build.targets
        shell: pwsh
        run: |
          $wtlDir  = (Get-ChildItem "C:\deps\wtl" -Recurse -Filter "atlapp.h" | Select-Object -First 1).DirectoryName
          $ws      = $env:GITHUB_WORKSPACE
          $extraIncludes = "$wtlDir;$ws\src\common;C:\vcpkg\installed\x86-windows\include;C:\deps\lua\src;C:\deps\LuaWrapper\LuaWrapper"
          $extraLibs     = "C:\vcpkg\installed\x86-windows\lib;C:\deps\lua\src"
          Write-Host "Extra includes: $extraIncludes"
          Write-Host "Extra libs:     $extraLibs"
          $lines = @(
            '<Project>',
            '  <PropertyGroup>',
            "    <IncludePath>`$(ProjectDir);$extraIncludes;`$(IncludePath)</IncludePath>",
            "    <LibraryPath>$extraLibs;`$(LibraryPath)</LibraryPath>",
            '  </PropertyGroup>',
            '</Project>'
          )
          Set-Content -Path "$ws\src\Felix\Directory.Build.targets" -Value $lines -Encoding UTF8
          Write-Host "Created Directory.Build.targets"
          Get-Content "$ws\src\Felix\Directory.Build.targets"

      - name: Build Felix core (Unicode_Release x86)
        shell: cmd
        run: |
          msbuild src/Felix/Felix.sln /p:Configuration=Unicode_Release /p:Platform=Win32 /p:LUA_DIR=C:\deps\lua /p:LUAWRAPPER_DIR=C:\deps\LuaWrapper /t:Felix /m /v:normal /flp:logfile=msbuild-felix.log;verbosity=normal

      - name: Surface MSBuild errors as annotations
        if: failure()
        shell: pwsh
        run: |
          if (Test-Path msbuild-felix.log) {
            Get-Content msbuild-felix.log |
              Where-Object { $_ -match ': error ' } |
              Select-Object -First 20 |
              ForEach-Object { Write-Host "::error::$_" }
          } else {
            Write-Host "::error::msbuild-felix.log not found — msbuild may have failed to start"
          }

      # -----------------------------------------------------------------------
      - name: Build Word Assist x86
        shell: cmd
        continue-on-error: true
        run: |
          msbuild src/WordAssist/WordAssist.sln /p:Configuration=Release /p:Platform=Win32 /m /v:minimal

      - name: Build Word Assist x64
        shell: cmd
        continue-on-error: true
        run: |
          msbuild src/WordAssist/WordAssist.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal

      # -----------------------------------------------------------------------
      - name: Build Excel Assist x86
        shell: cmd
        continue-on-error: true
        run: |
          msbuild src/ExcelAssist/ExcelAssist.sln /p:Configuration=Release /p:Platform=Win32 /m /v:minimal

      - name: Build Excel Assist x64
        shell: cmd
        continue-on-error: true
        run: |
          msbuild src/ExcelAssist/ExcelAssist.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal

      # -----------------------------------------------------------------------
      - name: Build PowerPoint Assist x86
        shell: cmd
        continue-on-error: true
        run: |
          msbuild src/PowerPointAssist/PowerPointAssist.sln /p:Configuration=Release /p:Platform=Win32 /m /v:minimal

      - name: Build PowerPoint Assist x64
        shell: cmd
        continue-on-error: true
        run: |
          msbuild src/PowerPointAssist/PowerPointAssist.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal

      # -----------------------------------------------------------------------
      - name: Collect build artifacts
        shell: bash
        run: |
          mkdir -p artifacts/x86 artifacts/x64
          # Felix builds to Unicode_Release/ (pattern "*/Release/*" matches "*/Unicode_Release/*")
          find src -name "Felix.exe"            -path "*/Release/*" -exec cp {} artifacts/x86/ \; 2>/dev/null || true
          find src -name "WordAssist.dll"       -path "*/Release/*" -not -path "*/x64/*" -exec cp {} artifacts/x86/ \; 2>/dev/null || true
          find src -name "ExcelAssist.dll"      -path "*/Release/*" -not -path "*/x64/*" -exec cp {} artifacts/x86/ \; 2>/dev/null || true
          find src -name "PowerPointAssist.dll" -path "*/Release/*" -not -path "*/x64/*" -exec cp {} artifacts/x86/ \; 2>/dev/null || true
          find src -name "WordAssist.dll"       -path "*/x64/*"     -exec cp {} artifacts/x64/ \; 2>/dev/null || true
          find src -name "ExcelAssist.dll"      -path "*/x64/*"     -exec cp {} artifacts/x64/ \; 2>/dev/null || true
          find src -name "PowerPointAssist.dll" -path "*/x64/*"     -exec cp {} artifacts/x64/ \; 2>/dev/null || true
          find src/Felix -name "SciLexer.dll"   -exec cp {} artifacts/x86/ \; 2>/dev/null || true
          echo "=== x86 artifacts ===" && ls artifacts/x86/ 2>/dev/null || echo "(none)"
          echo "=== x64 artifacts ===" && ls artifacts/x64/ 2>/dev/null || echo "(none)"

      # -----------------------------------------------------------------------
      - name: Verify Felix.exe was built
        shell: bash
        run: |
          if [ ! -f artifacts/x86/Felix.exe ]; then
            echo "::error::Felix.exe was not produced — build failed"
            exit 1
          fi
          echo "Felix.exe found: $(ls -la artifacts/x86/Felix.exe)"

      # -----------------------------------------------------------------------
      - name: Build InnoSetup installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Error "InnoSetup not found at $iscc"
            exit 1
          }
          & $iscc src/setup/Felix.iss /DMyAppVersion="${{ github.ref_name }}" /DOutputDir="${{ github.workspace }}\installer"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # -----------------------------------------------------------------------
      - name: Create source archive
        shell: bash
        run: |
          TAG=${{ github.ref_name }}
          7z a "felix-cat-classic-${TAG}-source.zip" \
              src/ docs/ manual/ README.md LICENSE CHANGELOG.md \
              -xr!".hg" -xr!"*.ipch" -xr!"Debug" -xr!"Release" -xr!"Unicode_Release"

      # -----------------------------------------------------------------------
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/*.log
            **/msbuild*.log

      - name: Upload artifacts for inspection
        uses: actions/upload-artifact@v4
        with:
          name: felix-classic-binaries
          path: |
            artifacts/
            installer/
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Felix Classic ${{ github.ref_name }}"
          body: |
            ## Felix Classic ${{ github.ref_name }}

            Maintained fork of Felix CAT, updated for modern Windows and 64-bit Office.
            Original design by Ryan Ginstrom — maintained by Ernst van Gassen.

            ### What's in this release
            See [CHANGELOG.md](https://github.com/arktos-ai-lab/felix-cat-classic/blob/master/CHANGELOG.md) for full details.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `Felix-Classic-Setup-*.exe` | Installer (recommended) |
            | `felix-cat-classic-*-source.zip` | Full source code |

            ### System requirements
            - Windows 10 or 11
            - Microsoft Office 2016, 2019, 2021, or Microsoft 365
            - For **64-bit Office** (default in Microsoft 365): the installer registers the x64 add-in DLLs automatically
            - For **32-bit Office**: the installer registers the x86 add-in DLLs automatically
            - Visual C++ Redistributable 2022

            ### Installation
            Run the installer `.exe` and follow the setup wizard.
            The Word, Excel, and PowerPoint add-ins are registered automatically.

            ---
            Original work © Ryan Ginstrom 1999–2015. Fork maintained by Ernst van Gassen. MIT licensed.

            [![Donate](https://img.shields.io/badge/Donate-PayPal-blue.svg)](https://paypal.me/VanGassen)
          files: |
            installer/*.exe
            felix-cat-classic-${{ github.ref_name }}-source.zip
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
